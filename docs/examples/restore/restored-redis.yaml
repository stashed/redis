apiVersion: kubedb.com/v1alpha2
kind: Redis
metadata:
  name: redis-recovery-test
  namespace: demo
spec:
  version: "5.0.3"
  storageType: Durable
  storage:
    storageClassName: "standard"
    accessModes:
    - ReadWriteOnce
    resources:
      requests:
        storage: 1Gi
  init:
    waitForInitialRestore: true