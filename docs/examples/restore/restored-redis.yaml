apiVersion: kubedb.com/v1alpha1
kind: Redis
metadata:
  name: restored-redis
  namespace: demo
spec:
  version: "5.0.3"
  databaseSecret:
    secretName: sample-redis-auth
  replicas: 1
  storageType: Durable
  storage:
    accessModes:
      - ReadWriteOnce
    resources:
      requests:
        storage: 50Mi
  init:
    stashRestoreSession:
      name: restore-sample-redis
  terminationPolicy: WipeOut